[meta]
name = "special-attacks"
version = "0.1.0"
description = "Special attack status effects — Hack, Drain, Overload, Debilitate, Disrupt, Fortify for Swarm"
author = "Swarm Team"

[dependencies]
combat-core = ">=0.1.0"

[config]
special_attacks_enabled = { type = "bool", default = true, description = "Enable special attack status effects" }
enabled = { type = "array<SpecialAttack>", default = ["Hack", "Drain", "Overload", "Debilitate", "Disrupt", "Fortify", "Leech", "Fabricate"], description = "Enabled special attack action names" }
tutorial_enabled = { type = "array<SpecialAttack>", default = ["Hack", "Drain", "Fortify"], description = "Special attacks enabled in tutorial worlds" }
novice_enabled = { type = "array<SpecialAttack>", default = ["Hack", "Drain", "Overload", "Fortify"], description = "Special attacks enabled for novice profiles" }
damage_multiplier = { type = "fixed_bp", default = 10000, description = "Special attack damage multiplier in fixed basis points" }
fabricate_allowed_output_structures = { type = "array<StructureType>", default = ["Tower"], description = "Ordered allowed Fabricate replacement structure types" }

[compatibility]
engine_abi_min = "1.0"
